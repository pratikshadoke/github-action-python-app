name: FastAPI CI/CD to K3s on EC2

on:
  push:
    branches: ["main"]

jobs:

# ================= CI =================
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build & Push Image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/fastapi-app:latest


# ================= CD =================
  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:

    - name: Deploy to EC2 K3s
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ec2-user
        key: ${{ secrets.EC2_KEY }}
        script: |

          echo "Deploying to Kubernetes..."

          # IMPORTANT: use correct kubeconfig
          export KUBECONFIG=$HOME/.kube/config

          # Apply manifests from LOCAL EC2 folder OR pipeline injection
          kubectl apply -f k8s/

          # Restart deployment to pull latest image
          kubectl rollout restart deployment fastapi-app

          # Verify
          kubectl rollout status deployment fastapi-app
          kubectl get pods
          kubectl get svc